server {
    listen 80;
    server_tokens off;

    location /api/ {
        proxy_pass http://backend:8000/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        proxy_pass http://backend:8000/admin/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /media/ {
        alias /media/;
    }

    location /static/ {
        alias /static/;
        autoindex on;
    }

    location / {
        root /static;
        index index.html;
    }
}