server {
    listen 80;
    server_tokens off;

    location /api/ {
        proxy_pass http://backend:8000;
    }

    location /admin/ {
        proxy_set_header Host $host;
        proxy_pass http://backend:8000;
    }

    location /media/ {
        alias /media/;
    }

    location /static/ {
        alias /static/;
    }

    location / {
        root /static;
        index index.html index.htm;
        try_files $uri /index.html;
    }
}