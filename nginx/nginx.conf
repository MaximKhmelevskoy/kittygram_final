server {
    listen 80;
    server_tokens off;

    location /api/ {
        proxy_pass http://backend:8000;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
    }

    location /media/ {
        alias /media/;
    }

    location /static/ {
        alias /static/;
    }

    location / {
        alias /static/;
        try_files $uri $uri/ /index.html;
    }
}